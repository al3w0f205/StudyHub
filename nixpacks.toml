# Nixpacks configuration for StudyHub
# Optimized for Coolify deployment

[phases.setup]
nixPkgs = [
    "nodejs_22",
    "openssl"
]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = ["npx prisma generate", "npm run build"]

[start]
cmd = "npm start"

[variables]
NEXT_TELEMETRY_DISABLED = "1"
NODE_ENV = "production"
